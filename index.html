<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Adivina la frase</title>

<style>

body{
  font-family:Arial;
  background:linear-gradient(135deg,#667eea,#764ba2,#6dd5ed);
  color:white;
  text-align:center;
  padding:20px;
}

.contenedor{
  max-width:1100px;
  margin:auto;
}

/* FRASE */
.frase{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:16px;
  margin:30px 0;
}

/* PALABRA */
.palabra{
  display:inline-flex;
  gap:8px;
  white-space:nowrap;
}

/* ESPACIO ENTRE PALABRAS */
.espacio{
  width:30px;
}

/* CASILLAS */
.casilla{
  width:60px;
  height:70px;
  border-radius:14px;
  background:rgba(255,255,255,0.2);
  border:2px solid rgba(255,255,255,0.4);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:bold;
  color:transparent;
  transition:0.3s;
}

/* LETRA VISIBLE */
.visible{
  color:white;
  background:orange;
}

/* CONTROLES */
input, button{
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
  font-size:16px;
}

button{
  cursor:pointer;
  font-weight:bold;
}

h1{
  margin-bottom:20px;
}

</style>
</head>

<body>

<div class="contenedor">

<h1>Adivina la frase</h1>

<input type="password" id="entradaFrase" placeholder="Escribe la frase">
<button onclick="crearJuego()">Crear</button>

<div id="panelFrase" class="frase"></div>

<input id="entradaLetra" maxlength="1" placeholder="A">
<button onclick="probarLetra()">Probar letra</button>

<h2 id="mensaje"></h2>

</div>

<script>

let fraseSecreta="";

function crearJuego(){

  fraseSecreta=document.getElementById("entradaFrase").value.toUpperCase();

  let panel=document.getElementById("panelFrase");
  panel.innerHTML="";

  // INTERROGACIÓN INICIAL SIEMPRE VISIBLE
  let interrogacionInicio=document.createElement("div");
  interrogacionInicio.className="casilla visible";
  interrogacionInicio.innerText="¿";
  panel.appendChild(interrogacionInicio);

  let palabras=fraseSecreta.split(" ");

  palabras.forEach((palabra,indexPalabra)=>{

    // CONTENEDOR PALABRA
    let divPalabra=document.createElement("div");
    divPalabra.className="palabra";

    for(let letra of palabra){

      let div=document.createElement("div");
      div.className="casilla";
      div.innerText=letra;

      divPalabra.appendChild(div);
    }

    panel.appendChild(divPalabra);

    // ESPACIO ENTRE PALABRAS
    if(indexPalabra < palabras.length - 1){

      let espacio=document.createElement("div");
      espacio.className="espacio";

      panel.appendChild(espacio);
    }

  });

  // INTERROGACIÓN FINAL SIEMPRE VISIBLE
  let interrogacionFinal=document.createElement("div");
  interrogacionFinal.className="casilla visible";
  interrogacionFinal.innerText="?";

  panel.appendChild(interrogacionFinal);

}

function probarLetra(){

  let letra=document.getElementById("entradaLetra").value.toUpperCase();

  if(!letra) return;

  let casillas=document.getElementsByClassName("casilla");

  let contador=0;
  let index=0;

  // Empezamos en 1 porque la primera casilla es "¿"
  for(let i=0;i<fraseSecreta.length;i++){

    if(fraseSecreta[i]!=" "){

      if(fraseSecreta[i]==letra){

        casillas[index+1].classList.add("visible");

        contador++;
      }

      index++;
    }
  }

  if(contador>0){

    document.getElementById("mensaje").innerText=
      "La letra " + letra + " aparece " + contador + " veces";

  }else{

    document.getElementById("mensaje").innerText=
      "La letra " + letra + " no está en la frase";

  }

  document.getElementById("entradaLetra").value="";

}

</script>

</body>
</html>
